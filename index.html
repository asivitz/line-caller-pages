<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <link rel="stylesheet" href="style.css?rand=<?=$rand;?>" type="text/css">
    <script src="elm.js?rand=<?=$rand;?>"></script>
  </head>
  <body>
    <div id="elm">
    </div>
    <script>
      var initialState;
      try {
          initialState = JSON.parse(localStorage.getItem('line-caller-app'));
      } catch (e) {
      }

      var app = Elm.Main.init({
          node: document.getElementById('elm'),
          flags: initialState
      });

      app.ports.save.subscribe(function (state) {
          localStorage.setItem('line-caller-app', state)
      });

      app.ports.flashRed.subscribe(() => {
          document.body.classList.add("flash");

          setTimeout(() => {
              document.body.classList.remove("flash");
          }, 300);
      });

      app.ports.exportState.subscribe(function () {
          const json = localStorage.getItem("line-caller-app");

          const blob = new Blob([json], { type: "application/json" });
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = "line-caller-app.json";
          a.click();

          URL.revokeObjectURL(url);
      });

    </script>
  </body>
</html>
